<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Video Recorder</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #111;
      color: #eee;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem;
      gap: 1rem;
    }

    h1 {
      font-size: 1rem;
      font-weight: 500;
      color: #aaa;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    #preview {
      width: 100%;
      max-width: 360px;
      aspect-ratio: 9 / 16;
      background: #000;
      border-radius: 12px;
      object-fit: cover;
      display: block;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      width: 100%;
      max-width: 360px;
    }

    .row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    label {
      font-size: 0.8rem;
      color: #aaa;
      white-space: nowrap;
    }

    select {
      flex: 1;
      background: #222;
      color: #eee;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 0.5rem 0.75rem;
      font-size: 0.9rem;
      appearance: none;
    }

    .btn {
      flex: 1;
      padding: 0.75rem;
      border-radius: 8px;
      border: none;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:active { opacity: 0.7; }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }

    #startBtn  { background: #e53e3e; color: #fff; }
    #stopBtn   { background: #444;    color: #eee; }
    #dlBtn     { background: #276749; color: #fff; display: none; }

    #status {
      font-size: 0.8rem;
      color: #aaa;
      text-align: center;
      min-height: 1.2em;
    }

    #recDot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #e53e3e;
      margin-right: 6px;
      animation: blink 1s step-start infinite;
      vertical-align: middle;
    }
    @keyframes blink { 50% { opacity: 0; } }

    #playback {
      width: 100%;
      max-width: 360px;
      aspect-ratio: 9 / 16;
      background: #000;
      border-radius: 12px;
      object-fit: cover;
      display: none;
    }
  </style>
</head>
<body>

  <h1>Video Recorder</h1>

  <video id="preview" autoplay muted playsinline></video>

  <div class="controls">
    <div class="row">
      <label for="codecSel">Codec</label>
      <select id="codecSel">
        <option value="vp9">VP9 (WebM)</option>
        <option value="h264">H.264 (MP4)</option>
      </select>
    </div>

    <div class="row">
      <button class="btn" id="startBtn">&#9679; Record</button>
      <button class="btn" id="stopBtn" disabled>&#9632; Stop</button>
    </div>

    <div id="status"></div>

    <button class="btn" id="dlBtn">&#8681; Download</button>
  </div>

  <video id="playback" controls playsinline></video>

  <script>
    const preview  = document.getElementById('preview');
    const playback = document.getElementById('playback');
    const startBtn = document.getElementById('startBtn');
    const stopBtn  = document.getElementById('stopBtn');
    const dlBtn    = document.getElementById('dlBtn');
    const codecSel = document.getElementById('codecSel');
    const status   = document.getElementById('status');

    let stream, recorder, chunks = [], blobUrl;

    const CODECS = {
      vp9:  { mime: 'video/webm;codecs=vp9',      ext: 'webm' },
      h264: { mime: 'video/mp4;codecs=avc1.42E01E', ext: 'mp4'  },
    };

    function pickMime(key) {
      const preferred = CODECS[key].mime;
      if (MediaRecorder.isTypeSupported(preferred)) return preferred;
      const fallbacks = key === 'h264'
        ? ['video/mp4', 'video/webm;codecs=vp9', 'video/webm']
        : ['video/webm', 'video/webm;codecs=vp8', 'video/mp4'];
      for (const m of fallbacks) {
        if (MediaRecorder.isTypeSupported(m)) return m;
      }
      return '';
    }

    function extFromMime(mime) {
      if (mime.includes('mp4')) return 'mp4';
      if (mime.includes('ogg')) return 'ogg';
      return 'webm';
    }

    async function initCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: { ideal: 720 }, height: { ideal: 1280 } },
          audio: true
        });
        preview.srcObject = stream;
        status.textContent = 'Camera ready.';
      } catch (e) {
        status.textContent = 'Camera error: ' + e.message;
      }
    }

    startBtn.addEventListener('click', () => {
      if (!stream) return;
      chunks = [];

      const key  = codecSel.value;
      const mime = pickMime(key);
      if (!mime) { status.textContent = 'No supported codec found.'; return; }

      recorder = new MediaRecorder(stream, { mimeType: mime });
      recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
      recorder.onstop = () => {
        const blob = new Blob(chunks, { type: mime });
        if (blobUrl) URL.revokeObjectURL(blobUrl);
        blobUrl = URL.createObjectURL(blob);

        playback.src     = blobUrl;
        playback.style.display = 'block';

        dlBtn.style.display = '';
        dlBtn.onclick = () => {
          const a = document.createElement('a');
          a.href     = blobUrl;
          a.download = 'recording.' + extFromMime(mime);
          a.click();
        };

        status.textContent = 'Done. Playback ready.';
      };

      recorder.start(200);
      startBtn.disabled = true;
      stopBtn.disabled  = false;
      dlBtn.style.display = 'none';
      playback.style.display = 'none';
      status.innerHTML  = '<span id="recDot"></span>Recording…';
    });

    stopBtn.addEventListener('click', () => {
      recorder.stop();
      startBtn.disabled = false;
      stopBtn.disabled  = true;
    });

    initCamera();
  </script>
</body>
</html>
