<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Video Recorder</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #111;
      color: #eee;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: max(0.75rem, env(safe-area-inset-top)) max(0.75rem, env(safe-area-inset-right)) max(1rem, env(safe-area-inset-bottom)) max(0.75rem, env(safe-area-inset-left));
      gap: 0.9rem;
    }

    h1 {
      width: min(100%, 460px);
      font-size: 0.95rem;
      font-weight: 600;
      color: #aaa;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      text-align: left;
    }

    #preview {
      width: min(100%, 460px);
      aspect-ratio: 45 / 64;
      background: #000;
      border-radius: 12px;
      object-fit: cover;
      display: block;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      width: min(100%, 460px);
    }

    .row {
      display: flex;
      gap: 0.6rem;
      align-items: center;
    }

    label {
      font-size: 0.8rem;
      color: #aaa;
      white-space: nowrap;
    }

    select {
      flex: 1;
      min-height: 46px;
      background: #222;
      color: #eee;
      border: 1px solid #444;
      border-radius: 10px;
      padding: 0.55rem 0.8rem;
      font-size: 1rem;
      appearance: none;
    }

    .btn {
      flex: 1;
      min-height: 48px;
      padding: 0.8rem;
      border-radius: 10px;
      border: none;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      touch-action: manipulation;
    }
    .btn:active { opacity: 0.7; }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }

    #startBtn  { background: #e53e3e; color: #fff; }
    #stopBtn   { background: #444;    color: #eee; }
    #dlBtn     { background: #276749; color: #fff; }

    #status {
      font-size: 0.88rem;
      color: #aaa;
      text-align: center;
      min-height: 1.2em;
    }

    #recDot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #e53e3e;
      margin-right: 6px;
      animation: blink 1s step-start infinite;
      vertical-align: middle;
    }
    @keyframes blink { 50% { opacity: 0; } }

    #playback {
      width: min(100%, 460px);
      aspect-ratio: 45 / 64;
      background: #000;
      border-radius: 12px;
      object-fit: cover;
      display: none;
    }

    @media (max-width: 420px) {
      .row {
        flex-wrap: wrap;
      }

      label {
        width: 100%;
      }

      .row.actions {
        flex-wrap: nowrap;
      }

      .btn {
        min-height: 50px;
      }
    }
  </style>
</head>
<body>

  <h1>Video Recorder</h1>

  <video id="preview" autoplay muted playsinline></video>

  <div class="controls">
    <div class="row">
      <label for="codecSel">Codec</label>
      <select id="codecSel">
        <option value="vp9">VP9 (WebM)</option>
        <option value="h264">H.264 (MP4)</option>
      </select>
    </div>

    <div class="row actions">
      <button class="btn" id="startBtn">&#9679; Record</button>
      <button class="btn" id="stopBtn" disabled>&#9632; Stop</button>
    </div>

    <div id="status"></div>

    <button class="btn" id="dlBtn" disabled>&#8681; Download Result</button>
  </div>

  <video id="playback" controls playsinline></video>

  <script>
    const preview  = document.getElementById('preview');
    const playback = document.getElementById('playback');
    const startBtn = document.getElementById('startBtn');
    const stopBtn  = document.getElementById('stopBtn');
    const dlBtn    = document.getElementById('dlBtn');
    const codecSel = document.getElementById('codecSel');
    const status   = document.getElementById('status');

    let stream, recorder, chunks = [], blobUrl;

    const CODECS = {
      vp9:  { mime: 'video/webm;codecs=vp9',      ext: 'webm' },
      h264: { mime: 'video/mp4;codecs=avc1.42E01E', ext: 'mp4'  },
    };

    function pickMime(key) {
      const preferred = CODECS[key].mime;
      if (MediaRecorder.isTypeSupported(preferred)) return preferred;
      const fallbacks = key === 'h264'
        ? ['video/mp4', 'video/webm;codecs=vp9', 'video/webm']
        : ['video/webm', 'video/webm;codecs=vp8', 'video/mp4'];
      for (const m of fallbacks) {
        if (MediaRecorder.isTypeSupported(m)) return m;
      }
      return '';
    }

    function extFromMime(mime) {
      if (mime.includes('mp4')) return 'mp4';
      if (mime.includes('ogg')) return 'ogg';
      return 'webm';
    }

    async function initCamera() {
      const aspect = 45 / 64;
      const videoProfiles = [
        {
          facingMode: { ideal: 'user' },
          width: { exact: 720 },
          height: { exact: 1024 },
          aspectRatio: { exact: aspect },
          resizeMode: 'crop-and-scale'
        },
        {
          facingMode: { ideal: 'user' },
          width: { min: 720, ideal: 720, max: 720 },
          height: { min: 1024, ideal: 1024, max: 1024 },
          aspectRatio: { ideal: aspect },
          resizeMode: 'crop-and-scale'
        },
        {
          facingMode: { ideal: 'user' },
          aspectRatio: { ideal: aspect }
        }
      ];

      for (const video of videoProfiles) {
        try {
          stream = await navigator.mediaDevices.getUserMedia({ video, audio: true });
          preview.srcObject = stream;

          const settings = stream.getVideoTracks()[0]?.getSettings?.() || {};
          const w = settings.width ?? '?';
          const h = settings.height ?? '?';
          status.textContent = `Camera ready (${w}x${h}).`;
          return;
        } catch (e) {
          // Try next profile
        }
      }

      status.textContent = 'Camera error: unable to get portrait 720x1024 stream.';
    }

    startBtn.addEventListener('click', () => {
      if (!stream) return;
      chunks = [];

      const key  = codecSel.value;
      const mime = pickMime(key);
      if (!mime) { status.textContent = 'No supported codec found.'; return; }

      recorder = new MediaRecorder(stream, {
        mimeType: mime,
        videoBitsPerSecond: 20_000_000
      });
      recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
      recorder.onstop = () => {
        const blob = new Blob(chunks, { type: mime });
        if (blobUrl) URL.revokeObjectURL(blobUrl);
        blobUrl = URL.createObjectURL(blob);

        playback.src     = blobUrl;
        playback.style.display = 'block';

        dlBtn.disabled = false;
        dlBtn.onclick = () => {
          const a = document.createElement('a');
          a.href     = blobUrl;
          a.download = 'recording.' + extFromMime(mime);
          a.click();
        };

        status.textContent = 'Done. Playback ready.';
      };

      recorder.start(200);
      startBtn.disabled = true;
      stopBtn.disabled  = false;
      dlBtn.disabled = true;
      playback.style.display = 'none';
      status.innerHTML  = '<span id="recDot"></span>Recording…';
    });

    stopBtn.addEventListener('click', () => {
      recorder.stop();
      startBtn.disabled = false;
      stopBtn.disabled  = true;
    });

    initCamera();
  </script>
</body>
</html>
