<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Video Recorder</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #111;
      color: #eee;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: max(0.75rem, env(safe-area-inset-top)) max(0.75rem, env(safe-area-inset-right)) max(1rem, env(safe-area-inset-bottom)) max(0.75rem, env(safe-area-inset-left));
      gap: 0.9rem;
    }

    h1 {
      width: min(100%, 460px);
      font-size: 0.95rem;
      font-weight: 600;
      color: #aaa;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      text-align: left;
    }

    #preview {
      width: min(100%, 460px);
      aspect-ratio: 3 / 4;
      background: #000;
      border-radius: 12px;
      object-fit: contain;
      display: block;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      width: min(100%, 460px);
    }

    .row {
      display: flex;
      gap: 0.6rem;
      align-items: center;
    }

    label {
      font-size: 0.8rem;
      color: #aaa;
      white-space: nowrap;
    }

    select {
      flex: 1;
      min-height: 46px;
      background: #222;
      color: #eee;
      border: 1px solid #444;
      border-radius: 10px;
      padding: 0.55rem 0.8rem;
      font-size: 1rem;
      appearance: none;
    }

    .row.toggle {
      justify-content: space-between;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 0.7rem 0.8rem;
    }

    .row.toggle label {
      color: #ddd;
      font-size: 0.9rem;
    }

    .row.toggle input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #e53e3e;
      cursor: pointer;
    }

    .btn {
      flex: 1;
      min-height: 48px;
      padding: 0.8rem;
      border-radius: 10px;
      border: none;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      touch-action: manipulation;
    }
    .btn:active { opacity: 0.7; }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }

    #startBtn  { background: #e53e3e; color: #fff; }
    #stopBtn   { background: #444;    color: #eee; }
    #dlBtn     { background: #276749; color: #fff; }

    #status {
      font-size: 0.88rem;
      color: #aaa;
      text-align: center;
      min-height: 1.2em;
    }

    #recDot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #e53e3e;
      margin-right: 6px;
      animation: blink 1s step-start infinite;
      vertical-align: middle;
    }
    @keyframes blink { 50% { opacity: 0; } }

    #playback {
      width: min(100%, 460px);
      aspect-ratio: 3 / 4;
      background: #000;
      border-radius: 12px;
      object-fit: contain;
      display: none;
    }

    @media (max-width: 420px) {
      .row {
        flex-wrap: wrap;
      }

      label {
        width: 100%;
      }

      .row.actions {
        flex-wrap: nowrap;
      }

      .btn {
        min-height: 50px;
      }
    }
  </style>
</head>
<body>

  <h1>Video Recorder</h1>

  <video id="preview" autoplay muted playsinline></video>

  <div class="controls">
    <div class="row">
      <label for="codecSel">Codec</label>
      <select id="codecSel">
        <option value="vp9">VP9 (WebM)</option>
        <option value="h264">H.264 (MP4)</option>
      </select>
    </div>

    <div class="row toggle" id="desktopPortraitRow">
      <label for="desktopPortraitToggle">Desktop portrait mode</label>
      <input id="desktopPortraitToggle" type="checkbox" checked />
    </div>

    <div class="row actions">
      <button class="btn" id="startBtn">&#9679; Record</button>
      <button class="btn" id="stopBtn" disabled>&#9632; Stop</button>
    </div>

    <div id="status"></div>

    <button class="btn" id="dlBtn" disabled>&#8681; Download Result</button>
  </div>

  <video id="playback" controls playsinline></video>

  <script>
    const preview  = document.getElementById('preview');
    const playback = document.getElementById('playback');
    const startBtn = document.getElementById('startBtn');
    const stopBtn  = document.getElementById('stopBtn');
    const dlBtn    = document.getElementById('dlBtn');
    const codecSel = document.getElementById('codecSel');
    const status   = document.getElementById('status');
    const desktopPortraitRow = document.getElementById('desktopPortraitRow');
    const desktopPortraitToggle = document.getElementById('desktopPortraitToggle');

    const PORTRAIT_RATIO = 3 / 4;
    const isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent)
      || navigator.userAgentData?.mobile === true;

    let stream, recorder, chunks = [], blobUrl;
    let sourceWidth = 0;
    let sourceHeight = 0;
    let drawCanvas = null;
    let drawCtx = null;
    let drawFrameHandle = 0;

    const CODECS = {
      vp9:  { mime: 'video/webm;codecs=vp9',      ext: 'webm' },
      h264: { mime: 'video/mp4;codecs=avc1.42E01E', ext: 'mp4'  },
    };

    function pickMime(key) {
      const preferred = CODECS[key].mime;
      if (MediaRecorder.isTypeSupported(preferred)) return preferred;
      const fallbacks = key === 'h264'
        ? ['video/mp4', 'video/webm;codecs=vp9', 'video/webm']
        : ['video/webm', 'video/webm;codecs=vp8', 'video/mp4'];
      for (const m of fallbacks) {
        if (MediaRecorder.isTypeSupported(m)) return m;
      }
      return '';
    }

    function extFromMime(mime) {
      if (mime.includes('mp4')) return 'mp4';
      if (mime.includes('ogg')) return 'ogg';
      return 'webm';
    }

    function shouldUseDesktopPortraitMode() {
      return !isMobile && desktopPortraitToggle.checked && sourceWidth > sourceHeight;
    }

    function applyPreviewLayout() {
      if (!sourceWidth || !sourceHeight) return;

      if (shouldUseDesktopPortraitMode()) {
        preview.style.aspectRatio = `${PORTRAIT_RATIO}`;
        preview.style.objectFit = 'cover';
      } else {
        preview.style.aspectRatio = `${sourceWidth} / ${sourceHeight}`;
        preview.style.objectFit = 'contain';
      }

      playback.style.aspectRatio = `${sourceWidth} / ${sourceHeight}`;
    }

    function stopCanvasPipeline() {
      if (drawFrameHandle) {
        cancelAnimationFrame(drawFrameHandle);
        drawFrameHandle = 0;
      }
      drawCtx = null;
      drawCanvas = null;
    }

    function createDesktopPortraitStream() {
      const srcW = preview.videoWidth || sourceWidth;
      const srcH = preview.videoHeight || sourceHeight;
      const outH = srcH;
      const outW = Math.max(1, Math.round(outH * PORTRAIT_RATIO));
      const cropW = Math.min(srcW, Math.round(srcH * PORTRAIT_RATIO));
      const sx = Math.max(0, Math.floor((srcW - cropW) / 2));

      drawCanvas = document.createElement('canvas');
      drawCanvas.width = outW;
      drawCanvas.height = outH;
      drawCtx = drawCanvas.getContext('2d', { alpha: false, desynchronized: true });

      const render = () => {
        if (!drawCtx) return;
        drawCtx.drawImage(preview, sx, 0, cropW, srcH, 0, 0, outW, outH);
        drawFrameHandle = requestAnimationFrame(render);
      };
      render();

      const canvasStream = drawCanvas.captureStream(30);
      const audioTrack = stream.getAudioTracks()[0];
      if (audioTrack) canvasStream.addTrack(audioTrack);

      return {
        stream: canvasStream,
        aspect: `${outW} / ${outH}`,
      };
    }

    async function initCamera() {
      if (isMobile) {
        desktopPortraitRow.style.display = 'none';
      } else {
        desktopPortraitToggle.addEventListener('change', applyPreviewLayout);
      }

      const videoProfiles = [
        {
          facingMode: { ideal: 'user' },
          width: { ideal: 1280 },
          height: { ideal: 720 }
        },
        {
          facingMode: { ideal: 'user' },
          width: { ideal: 640 },
          height: { ideal: 480 }
        },
        {
          facingMode: { ideal: 'user' }
        }
      ];

      for (const video of videoProfiles) {
        try {
          stream = await navigator.mediaDevices.getUserMedia({ video, audio: true });
          preview.srcObject = stream;
          await preview.play().catch(() => {});

          const settings = stream.getVideoTracks()[0]?.getSettings?.() || {};
          sourceWidth = Number(settings.width) || 0;
          sourceHeight = Number(settings.height) || 0;

          if (sourceWidth > 0 && sourceHeight > 0) {
            applyPreviewLayout();
            status.textContent = `Camera ready (${sourceWidth}x${sourceHeight}).`;
          } else {
            status.textContent = 'Camera ready.';
          }
          return;
        } catch (e) {
          // Try next profile
        }
      }

      status.textContent = 'Camera error: unable to access camera stream.';
    }

    startBtn.addEventListener('click', () => {
      if (!stream) return;
      chunks = [];
      stopCanvasPipeline();

      const key  = codecSel.value;
      const mime = pickMime(key);
      if (!mime) { status.textContent = 'No supported codec found.'; return; }

      let recordingStream = stream;
      let playbackAspect = `${sourceWidth || 3} / ${sourceHeight || 4}`;

      if (shouldUseDesktopPortraitMode()) {
        const portrait = createDesktopPortraitStream();
        recordingStream = portrait.stream;
        playbackAspect = portrait.aspect;
      }

      recorder = new MediaRecorder(recordingStream, {
        mimeType: mime,
        videoBitsPerSecond: 20_000_000
      });
      recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
      recorder.onstop = () => {
        stopCanvasPipeline();

        const blob = new Blob(chunks, { type: mime });
        if (blobUrl) URL.revokeObjectURL(blobUrl);
        blobUrl = URL.createObjectURL(blob);

        playback.src = blobUrl;
        playback.style.aspectRatio = playbackAspect;
        playback.style.display = 'block';

        dlBtn.disabled = false;
        dlBtn.onclick = () => {
          const a = document.createElement('a');
          a.href     = blobUrl;
          a.download = 'recording.' + extFromMime(mime);
          a.click();
        };

        status.textContent = 'Done. Playback ready.';
      };

      recorder.start(200);
      startBtn.disabled = true;
      stopBtn.disabled  = false;
      dlBtn.disabled = true;
      playback.style.display = 'none';
      status.innerHTML = '<span id="recDot"></span>Recording…';
    });

    stopBtn.addEventListener('click', () => {
      recorder.stop();
      startBtn.disabled = false;
      stopBtn.disabled  = true;
    });

    initCamera();
  </script>
</body>
</html>
